name: Production Deployment
on:
  push:
    branches: [ main ]  # Triggers deployment whenever you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Updated to Node 22 to prevent the deprecation error
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42 # Upgraded to v42 for complete Node 24 support
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }} 
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }} 
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }} 
          vercel-args: '--prod' 
          vercel-build: true # Tells the action to manage the build flow smoothly inside the runner